# Run tests from repo root (only backend/tests). Use the backend venv interpreter
# so deps (fastapi, asyncpg, …) resolve — see conftest.py and scripts/backend-pytest.sh.
[pytest]
testpaths = backend/tests
pythonpath = backend
addopts = -q
asyncio_mode = auto
norecursedirs =
    *.egg
    .*
    _darcs
    build
    CVS
    dist
    node_modules
    venv
    .venv
    {arch}
    lib
    lib64
    site-packages
    Include
    Scripts
    __pycache__
    frontend
    telegram-bot
    desktop
    supabase
