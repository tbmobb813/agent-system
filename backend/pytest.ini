[pytest]
testpaths = tests
pythonpath = .
addopts = -q
asyncio_mode = auto
# If pytest is invoked from inside `.venv/`, the default ignore rules still descend
# into `lib/` / `lib64/` (not venv roots). Never collect third‑party test suites there.
norecursedirs =
    *.egg
    .*
    _darcs
    build
    CVS
    dist
    node_modules
    venv
    .venv
    {arch}
    lib
    lib64
    site-packages
    Include
    Scripts
    __pycache__
