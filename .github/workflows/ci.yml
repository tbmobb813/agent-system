name: CI

on:
  push:
    branches:
      - main
      - test
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      telegram: ${{ steps.filter.outputs.telegram }}
      migrations: ${{ steps.filter.outputs.migrations }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'supabase/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'
            telegram:
              - 'telegram-bot/**'
              - '.github/workflows/ci.yml'
            migrations:
              - 'supabase/migrations/**'
              - '.github/workflows/ci.yml'

  backend:
    name: Backend Tests
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          BACKEND_API_KEY: sk-agent-local-dev
          OPENROUTER_BUDGET_MONTHLY: "30.0"
        run: pytest

  frontend:
    name: Frontend Lint and Build
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run lint

      - name: Build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build

  telegram:
    name: Telegram Bot Validation
    needs: changes
    if: needs.changes.outputs.telegram == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: telegram-bot
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: telegram-bot/requirements-telegram.txt

      - name: Install dependencies
        run: pip install -r requirements-telegram.txt

      - name: Validate imports and syntax
        run: python -m py_compile bot.py

  migrations:
    name: SQL Migration Validation
    needs: changes
    if: needs.changes.outputs.migrations == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate SQL files exist
        run: |
          count=$(find supabase/migrations -name '*.sql' | wc -l)
          if [ $count -eq 0 ]; then
            echo "No SQL migration files found"
            exit 1
          fi
          echo "Found $count SQL migration files"

      - name: Check for SQL syntax issues
        run: |
          for file in supabase/migrations/*.sql; do
            if [ ! -s "$file" ]; then
              echo "Empty file: $file"
              exit 1
            fi
            echo "✓ $file ($(wc -l < "$file") lines)"
          done
