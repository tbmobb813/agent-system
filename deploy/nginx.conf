# =============================================================================
# Nginx config for agent.techtrendwire.com
# Place at: /etc/nginx/sites-available/agent
# Enable:   ln -s /etc/nginx/sites-available/agent /etc/nginx/sites-enabled/agent
#
# Certbot will automatically append the SSL server block when you run:
#   sudo certbot --nginx -d agent.techtrendwire.com
# =============================================================================

server {
    listen 80;
    server_name agent.techtrendwire.com;

    # Redirect HTTP → HTTPS once SSL is set up (certbot adds this automatically)
    # Until then, this serves HTTP for the initial setup.

    # ── SSE streaming endpoint — must have buffering off ──────────────────────
    # This is routed BEFORE the general /api/backend/ block.
    location /api/backend/agent/stream {
        proxy_pass         http://127.0.0.1:8000/agent/stream;
        proxy_http_version 1.1;

        # Disable ALL buffering — critical for SSE
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 310s;   # slightly longer than MAX_STREAM_SECONDS (300s)
        proxy_send_timeout 310s;

        # SSE headers
        proxy_set_header   Connection        '';
        proxy_set_header   X-Accel-Buffering no;
        add_header         Cache-Control     'no-cache';
        add_header         X-Accel-Buffering no;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── All other backend API calls ───────────────────────────────────────────
    location /api/backend/ {
        proxy_pass         http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_read_timeout 30s;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Next.js frontend ──────────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 30s;
    }

    # ── Static assets — long cache ────────────────────────────────────────────
    location /_next/static/ {
        proxy_pass         http://127.0.0.1:3003/_next/static/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        expires            1y;
        add_header         Cache-Control "public, immutable";
    }

    # Gzip
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml text/javascript;
}
